services:
  nekro-user-panel:
    build: .
    container_name: nekro_user_panel
    restart: always
    network_mode: host
    volumes:
      - ./instances.json:/app/instances.json
      - ./filters.py:/app/filters.py
      - ./route_whitelist.py:/app/route_whitelist.py
      - ./proxy.py:/app/proxy.py
      - ./auth.py:/app/auth.py
      - ./config.py:/app/config.py
      - ./main.py:/app/main.py
      - ./admin_page.py:/app/admin_page.py
      - ./frontend_inject.py:/app/frontend_inject.py
    environment:
      - PANEL_HOST=0.0.0.0
      - PANEL_PORT=9054
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=Wdx030014
      - PANEL_JWT_SECRET=nekro-user-panel-secret-change-me
      - PANEL_JWT_EXPIRE_HOURS=24
